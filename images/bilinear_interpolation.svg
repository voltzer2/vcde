  <circle cx="320" cy="60" r="8" fill="#cf222e"/>
  <circle cx="80" cy="220" r="8" fill="#cf222e"/>
  <circle cx="320" cy="220" r="8" fill="#cf222e"/>
  <text x="55" y="55" font-family="sans-serif" font-size="11" fill="#24292f">v00</text>
